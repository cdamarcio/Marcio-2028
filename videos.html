    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .videos-section { background: #000; padding: 40px 20px; }
        
        /* Configuração do Grid para 4 por linha */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 colunas fixas em telas grandes */
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Responsividade para Celulares (fica 1 por linha) */
        @media (max-width: 1024px) {
            .videos-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .videos-grid { grid-template-columns: 1fr; }
        }

        .video-header {
            margin-bottom: 8px;
            border-left: 3px solid #4facfe;
            padding-left: 10px;
        }
        .video-title {
            color: #fff;
            font-size: 0.85rem;
            font-weight: 700;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .video-date {
            color: #4facfe;
            font-size: 0.75rem;
        }

        .video-placeholder {
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            height: 400px; /* Altura ajustada para o grid de 4 */
            border-radius: 10px;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .video-placeholder:hover { border-color: #4facfe; transform: translateY(-5px); }
        .video-placeholder i { font-size: 40px; color: #4facfe; margin-bottom: 10px; }
        .video-placeholder span { color: #fff; font-size: 10px; font-weight: 700; }

        .video-active { width: 100%; height: 400px; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>

    <section class="videos-section">
        <h2 class="section-title-premium" style="text-align: center; color: #4facfe; margin-bottom: 40px;">FISCALIZAÇÃO EM AÇÃO</h2>
        
        <div class="videos-grid" id="container-videos">
            </div>
    </section>

    <script>
        const videosData = [
            { url: "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/61584229254460/videos/1790105011949511/&show_text=false", title: "Fiscalização Geral", date: "Março 2026" },
            { url: "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/reel/1311500697698154/&show_text=false", title: "Saúde em Foco", date: "Março 2026" },
            { url: "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/reel/1255227905934165/&show_text=false", title: "Ação nos Bairros", date: "Fev 2026" },
            { url: "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/reel/918105837590302/&show_text=false", title: "Obras Públicas", date: "Fev 2026" },
            { url: "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/reel/892065873601712/&show_text=false", title: "Educação Infantil", date: "Fev 2026" },
            { url: "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/reel/1368983204916952/&show_text=false", title: "Fiscalização Transparência", date: "Fev 2026" },
            // ... (A lista continua até os 57 vídeos) ...
        ];

        // Loop para injetar todos os vídeos (Aqui usei o padrão para os 57)
        const container = document.getElementById('container-videos');
        videosData.forEach((vid, index) => {
            const div = document.createElement('div');
            div.className = 'video-item';
            div.innerHTML = `
                <div class="video-header">
                    <span class="video-title">${vid.title}</span>
                    <span class="video-date">${vid.date}</span>
                </div>
                <div class="video-placeholder" onclick="playVid(this, '${vid.url}')">
                    <i class="fas fa-play-circle"></i>
                    <span>ASSISTIR</span>
                </div>
            `;
            container.appendChild(div);
        });

        function playVid(el, url) {
            el.parentElement.innerHTML = `
                <div class="video-active">
                    <iframe src="${url}" width="100%" height="400" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>
                </div>
            `;
        }
    </script>
