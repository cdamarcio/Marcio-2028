            width: 100%; height: 450px; background: linear-gradient(135deg, #001a33 0%, #000 100%);

        }
        .video-box i { font-size: 50px; color: #4facfe; opacity: 0.8; transition: 0.3s; z-index: 1; }
        .video-box:hover i { transform: scale(1.2); opacity: 1; }
        
        /* Texto de ajuda para o usuário */
        .video-box::after { content: 'CLIQUE PARA ASSISTIR'; position: absolute; bottom: 20px; font-size: 0.7rem; font-weight: 700; color: #4facfe; letter-spacing: 1px; }
