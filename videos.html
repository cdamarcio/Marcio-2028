    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .video-wrapper {
            position: relative;
            padding-bottom: 177.77%; /* Proporção vertical para Reels/Shorts */
            height: 0;
            overflow: hidden;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }
        .fb-video-wrapper {
            padding-bottom: 100%; /* Ajuste para vídeos quadrados do FB */
        }
    </style>
</head>

    </header>

        ];

        const grid = document.getElementById('video-grid');

        vids.forEach((video, index) => {
            const card = document.createElement('div');
            card.className = "bg-gray-800 rounded-lg overflow-hidden shadow-lg border border-gray-700";
            
            let embedUrl = "";
            const videoNumber = vids.length - index;

            // Lógica para gerar o link de embed correto
            if (video.url.includes("youtube.com") || video.url.includes("youtu.be")) {
                let id = "";
                if(video.url.includes("shorts/")) id = video.url.split("shorts/")[1].split("?")[0];
                else if(video.url.includes("v=")) id = video.url.split("v=")[1].split("&")[0];
                embedUrl = `https://www.youtube.com/embed/${id}`;
            } else if (video.url.includes("facebook.com")) {
                embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(video.url)}&show_text=0`;
            }

            card.innerHTML = `
                <div class="video-wrapper ${video.url.includes('videos') ? 'fb-video-wrapper' : ''}">
                    <iframe src="${embedUrl}" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>
                </div>
                <div class="p-3">
                    <p class="text-yellow-500 font-bold text-xs uppercase">Vídeo ${videoNumber}</p>
                    <a href="${video.url}" target="_blank" class="text-sm hover:text-blue-400 transition block mt-1 truncate">
                        Ver postagem original <i class="fas fa-external-link-alt ml-1 text-xs"></i>
                    </a>
                </div>
            `;
            grid.appendChild(card);
        });
