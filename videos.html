<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos - Márcio O Fiscal do Povo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos Base */
        body { background: #000; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; color: #fff; }
        .videos-section { padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .section-title-premium { font-size: 2rem; color: #4facfe; font-weight: 900; text-transform: uppercase; border-bottom: 3px solid #d4af37; margin-bottom: 40px; }
        
        /* Grid de Miniaturas */
        .videos-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            width: 100%; 
            max-width: 1400px; 
        }

        .video-item { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .video-item:hover { transform: translateY(-5px); border-color: #4facfe; }

        .video-header { padding: 10px; background: #1a1a1a; border-bottom: 1px solid #333; }
        .video-title { font-size: 0.8rem; font-weight: 800; color: #4facfe; }

        /* Container da Miniatura/Player */
        .video-box { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 9 / 16; /* Formato vertical (Reels/Shorts) */
            background: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-box img { 
            width: 100%; height: 100%; object-fit: cover; opacity: 0.7; 
            transition: 0.4s; loading: lazy; /* Carrega apenas quando visível */
        }

        .video-box:hover img { opacity: 1; }

        .video-box i { 
            position: absolute; font-size: 50px; color: #fff; opacity: 0.8; 
            z-index: 2; text-shadow: 0 0 15px rgba(0,0,0,0.5); 
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Botão WhatsApp */
        .whatsapp-float { position: fixed; width: 60px; height: 60px; bottom: 40px; right: 40px; background: #25d366; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1000; text-decoration: none; }
    </style>
</head>
<body>

    <section class="videos-section">
        <h2 class="section-title-premium">FISCALIZAÇÃO EM AÇÃO</h2>
        <div class="videos-grid" id="main-grid"></div>
    </section>

    <a href="https://wa.me/5594992500073" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <script>
        const vids = [
            { id: "ct3KEIpG-8c", type: "youtube" }, // Vídeo 59
            { url: "https://www.facebook.com/MarcioFiscalDoPovo/videos/26456801260642575/", thumb: "img/capa58.png", type: "fb" },
            { url: "https://www.facebook.com/61584229254460/videos/1790105011949511/", thumb: "img/capa57.png", type: "fb" },
            { url: "https://www.facebook.com/reel/1311500697698154/", thumb: "img/capa56.png", type: "fb" },
            // ... adicione os outros aqui seguindo o padrão
        ];

        const grid = document.getElementById('main-grid');
        const total = vids.length;

        vids.forEach((vid, i) => {
            const num = total - i;
            const displayNum = num < 10 ? '0' + num : num;
            
            // Define a imagem da miniatura
            let thumbnail = vid.thumb;
            if(vid.type === 'youtube') {
                thumbnail = `https://img.youtube.com/vi/${vid.id}/hqdefault.jpg`;
            }

            const item = document.createElement('div');
            item.className = 'video-item';
            item.innerHTML = `
                <div class="video-header"><span class="video-title">AÇÃO #${displayNum}</span></div>
                <div class="video-box" onclick="loadPlayer(this, i)">
                    <img src="${thumbnail}" alt="Capa" loading="lazy">
                    <i class="fas fa-play-circle"></i>
                </div>
            `;
            grid.appendChild(item);

            // Função interna para carregar o player só no clique
            item.querySelector('.video-box').onclick = function() {
                if(vid.type === 'youtube') {
                    this.innerHTML = `<iframe src="https://www.youtube.com/embed/${vid.id}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
                } else {
                    const fbUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(vid.url)}&show_text=false&autoplay=true`;
                    this.innerHTML = `<iframe src="${fbUrl}" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>`;
                }
            };
        });
    </script>
</body>
</html>
